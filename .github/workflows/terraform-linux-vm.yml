name: Terraform Linux VM

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Terraform operation to run
        required: true
        default: plan
        type: choice
        options:
          - discover-skus
          - plan
          - apply
          - destroy
      prefix:
        description: Short lower-case prefix for resource names
        required: true
        default: demovm
        type: string
      environment:
        description: Environment tag
        required: true
        default: dev
        type: string
      location:
        description: Azure region
        required: true
        default: eastus
        type: string
      vm_size:
        description: Azure VM size
        required: true
        default: Standard_B1s
        type: string
      ssh_allowed_cidrs:
        description: Terraform list syntax for allowed SSH CIDRs
        required: true
        default: "[\"0.0.0.0/0\"]"
        type: string

concurrency:
  group: terraform-linux-vm
  cancel-in-progress: false

env:
  AZURE_CORE_OUTPUT: none
  TF_IN_AUTOMATION: true
  TF_WORKING_DIR: templates/linux-vm

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Setup Terraform
        if: inputs.operation != 'discover-skus'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write Terraform variables
        if: inputs.operation != 'discover-skus'
        env:
          ADMIN_SSH_PUBLIC_KEY: ${{ secrets.TF_VAR_ADMIN_SSH_PUBLIC_KEY }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          if [ -z "$ADMIN_SSH_PUBLIC_KEY" ]; then
            echo "Repository secret TF_VAR_ADMIN_SSH_PUBLIC_KEY is required."
            exit 1
          fi

          if [ -z "$ARM_CLIENT_SECRET" ]; then
            echo "Repository secret AZURE_CLIENT_SECRET is required."
            exit 1
          fi

          cat > github.auto.tfvars <<EOF
          prefix               = "${{ inputs.prefix }}"
          environment          = "${{ inputs.environment }}"
          location             = "${{ inputs.location }}"
          vm_size              = "${{ inputs.vm_size }}"
          admin_ssh_public_key = "${ADMIN_SSH_PUBLIC_KEY}"
          ssh_allowed_cidrs    = ${{ inputs.ssh_allowed_cidrs }}
          EOF

      - name: Discover free tier VM SKUs
        if: inputs.operation == 'discover-skus'
        run: |
          set -euo pipefail

          regions=(
            eastus
            eastus2
            centralus
            southcentralus
            westus2
            westus3
            northcentralus
            westcentralus
          )

          sizes=(
            Standard_B1s
            Standard_B2ats_v2
            Standard_B2pts_v2
          )

          found="false"

          echo "Checking free-tier-friendly VM sizes for this subscription..."

          for region in "${regions[@]}"; do
            for size in "${sizes[@]}"; do
              sku_json="$(az vm list-skus \
                --location "$region" \
                --size "$size" \
                --all \
                --query "[?name=='$size'] | [0]" \
                --output json)"

              if [ "$sku_json" != "null" ] && [ "$(echo "$sku_json" | jq '.restrictions | length')" -eq 0 ]; then
                echo "${region}: ${size}"
                found="true"
              fi
            done
          done

          if [ "$found" = "false" ]; then
            echo "No free-tier-friendly VM SKUs were available in the scanned regions."
            echo "Try another Azure region, or check whether this subscription has VM quota/free-service restrictions."
            exit 1
          fi

      - name: Register Azure resource providers
        if: inputs.operation != 'discover-skus'
        run: |
          for namespace in Microsoft.Compute Microsoft.Network; do
            echo "Registering ${namespace}..."
            az provider register --namespace "${namespace}" --wait
          done

      - name: Check VM SKU availability
        if: inputs.operation != 'discover-skus'
        env:
          LOCATION: ${{ inputs.location }}
          VM_SIZE: ${{ inputs.vm_size }}
        run: |
          set -euo pipefail

          sku_json="$(az vm list-skus \
            --location "$LOCATION" \
            --size "$VM_SIZE" \
            --all \
            --query "[?name=='$VM_SIZE'] | [0]" \
            --output json)"

          sku_is_unrestricted() {
            local candidate="$1"
            local candidate_json
            local candidate_restrictions_count

            candidate_json="$(az vm list-skus \
              --location "$LOCATION" \
              --size "$candidate" \
              --all \
              --query "[?name=='$candidate'] | [0]" \
              --output json)"

            if [ "$candidate_json" = "null" ]; then
              return 1
            fi

            candidate_restrictions_count="$(echo "$candidate_json" | jq '.restrictions | length')"
            [ "$candidate_restrictions_count" -eq 0 ]
          }

          print_sku_suggestions() {
            local found_free_tier="false"
            local found_fallback="false"
            local fallback_candidates

            echo "Free-tier-friendly VM sizes available in '$LOCATION':"
            for candidate in Standard_B1s Standard_B2ats_v2 Standard_B2pts_v2; do
              if sku_is_unrestricted "$candidate"; then
                echo "$candidate"
                found_free_tier="true"
              fi
            done

            if [ "$found_free_tier" = "false" ]; then
              echo "(none found in this location for this subscription)"
            fi

            echo "Small fallback VM sizes available in '$LOCATION':"
            fallback_candidates="$(az vm list-skus --location "$LOCATION" --resource-type virtualMachines --all --output json \
              | jq -r '
                [ .[].name ]
                | unique
                | map(select(test("^Standard_(B1|B2|DS1|DS2|D1|D2)(s)?(_v2|ats_v2|pts_v2)?$")))
                | .[:25]
                | .[]
              ')"

            while IFS= read -r candidate; do
              if [ -n "$candidate" ] && sku_is_unrestricted "$candidate"; then
                echo "$candidate"
                found_fallback="true"
              fi
            done <<< "$fallback_candidates"

            if [ "$found_fallback" = "false" ]; then
              echo "(none found in this location for this subscription)"
            fi
          }

          if [ "$sku_json" = "null" ]; then
            echo "VM size '$VM_SIZE' was not found in Azure location '$LOCATION'."
            print_sku_suggestions
            exit 1
          fi

          restrictions_count="$(echo "$sku_json" | jq '.restrictions | length')"

          if [ "$restrictions_count" -gt 0 ]; then
            echo "VM size '$VM_SIZE' has availability restrictions in '$LOCATION'."
            echo "$sku_json" | jq -r '.restrictions[] | "- " + (.reasonCode // "Restriction")'
            echo "Choose another vm_size or location before running apply."
            print_sku_suggestions
            exit 1
          fi

      - name: Terraform fmt
        if: inputs.operation != 'discover-skus'
        working-directory: ${{ github.workspace }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        if: inputs.operation != 'discover-skus'
        run: terraform init

      - name: Terraform validate
        if: inputs.operation != 'discover-skus'
        run: terraform validate

      - name: Terraform plan
        if: inputs.operation != 'discover-skus'
        timeout-minutes: 20
        run: |
          if [ "${{ inputs.operation }}" = "destroy" ]; then
            terraform plan -destroy -input=false -no-color -out=tfplan
          else
            terraform plan -input=false -no-color -out=tfplan
          fi

      - name: Upload Terraform plan
        if: success() && inputs.operation != 'discover-skus'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-linux-vm-plan-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

      - name: Terraform apply
        if: inputs.operation == 'apply' || inputs.operation == 'destroy'
        run: terraform apply -input=false -no-color tfplan
